<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Background Obsdian Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.85"/>
    </linearGradient>
    
    <!-- Metallic Tier Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#fbbf24dd"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.65" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient Outer Glow -->
  <rect x="18" y="18" width="84" height="84" rx="20" fill="none" stroke="#f59e0b" stroke-width="2" filter="url(#neonGlow)" opacity="0.3"/>

  <!-- Sleek Cyber-Shield Container -->
  <rect x="15" y="15" width="90" height="90" rx="22" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2" filter="url(#neonGlow)"/>

  <!-- Cybernetic Corner Detail Points -->
  <rect x="22" y="22" width="76" height="76" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="0.75" opacity="0.35"/>

  <!-- Outer Crosshair Tick Markers -->
  <line x1="60" y1="11" x2="60" y2="15" stroke="#fbbf24" stroke-width="1.5" opacity="0.75" />
  <line x1="60" y1="105" x2="60" y2="109" stroke="#fbbf24" stroke-width="1.5" opacity="0.75" />
  <line x1="11" y1="60" x2="15" y2="60" stroke="#fbbf24" stroke-width="1.5" opacity="0.75" />
  <line x1="105" y1="60" x2="109" y2="60" stroke="#fbbf24" stroke-width="1.5" opacity="0.75" />

  <!-- Inner Concentric Orbit -->
  <circle cx="60" cy="60" r="23" fill="#05070c" fill-opacity="0.7" stroke="url(#borderGrad)" stroke-width="1" opacity="0.45"/>

  <!-- Central Vector Icon -->
  <g transform="translate(48, 48) scale(1.0)" filter="drop-shadow(0 0 2px #f59e0b55)">
    
    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20v3H6.5a1.5 1.5 0 0 0-1.5 1.5z" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
    <path d="M6 2H20v15H6a3 3 0 0 0-3 3V5a3 3 0 0 1 3-3z" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
  
  </g>
</svg>
